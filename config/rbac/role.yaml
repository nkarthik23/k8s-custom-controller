---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps.yourdomain.dev
  resources:
  - metricautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps.yourdomain.dev
  resources:
  - metricautoscalers/finalizers
  verbs:
  - update
- apiGroups:
  - apps.yourdomain.dev
  resources:
  - metricautoscalers/status
  verbs:
  - get
  - patch
  - update
